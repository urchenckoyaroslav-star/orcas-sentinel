<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="_KwUSSjTUf9_a7zKBkQk0zJrEm_IGE9HJupji9CiMOw" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐼</text></svg>">
    <title>PANDA_SENTINEL | Weekly Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --br-gold: #ffd700; --br-green: #39ff14; --br-red: #ff003c; }
        body { background: #050508; color: #fff; font-family: 'Rajdhani', sans-serif; }
        .cyber-card { background: rgba(15, 15, 20, 0.9); border: 1px solid rgba(255, 215, 0, 0.2); border-top: 3px solid var(--br-gold); }
        .light { width: 60px; height: 60px; border-radius: 50%; filter: brightness(0.2); border: 3px solid #111; transition: 0.3s; }
        .light.active { filter: brightness(1.5); box-shadow: 0 0 30px currentColor; border-color: currentColor; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <header class="w-full max-w-5xl flex justify-between items-center py-6">
        <h1 class="font-cyber text-3xl text-white">PANDA_<span style="color:var(--br-gold)">SENTINEL</span></h1>
        <div class="flex gap-2">
            <button class="bg-black border border-yellow-600/40 px-3 py-1 text-xs rounded text-yellow-500">ENG</button>
            <button class="bg-black border border-yellow-600/40 px-3 py-1 text-xs rounded text-gray-500">RUS</button>
            <button class="bg-black border border-yellow-600/40 px-3 py-1 text-xs rounded text-gray-500">UKR</button>
        </div>
    </header>

    <div class="w-full max-w-5xl cyber-card rounded-3xl p-6 flex flex-col items-center">
        <div id="chart-box" class="w-full h-80 rounded-xl overflow-hidden mb-6 border border-white/5"></div>
        
        <div class="text-cyan-400 font-cyber text-sm tracking-widest mb-2">BITCOIN WEEKLY LOG</div>
        <div id="btc-price" class="font-cyber text-6xl md:text-7xl mb-8">$0</div>

        <div class="flex gap-10 mb-8 bg-black/50 p-6 rounded-full border border-white/5">
            <div id="l-red" class="light" style="color:var(--br-red)"></div>
            <div id="l-yellow" class="light" style="color:#ffd700"></div>
            <div id="l-green" class="light" style="color:var(--br-green)"></div>
        </div>
        <div id="status" class="w-full bg-black/40 p-4 rounded-xl text-center text-xl font-bold tracking-widest border border-yellow-600/20">CONNECTING...</div>
    </div>

    <script>
        // Ініціалізація графіка
        const chart = LightweightCharts.createChart(document.getElementById('chart-box'), {
            layout: { background: { color: '#0a0a0f' }, textColor: '#888' },
            grid: { vertLines: { visible: false }, horzLines: { color: '#1a1a25' } },
            timeScale: { borderColor: '#222' }
        });
        const candles = chart.addCandlestickSeries({ upColor: '#39ff14', downColor: '#ff003c', borderVisible: false });

        async function sync() {
            try {
                // Пульс
                const pRes = await fetch('/api/pulse'); const p = await pRes.json();
                document.getElementById('btc-price').innerText = '$' + Math.floor(p.btc_price).toLocaleString();
                document.getElementById('status').innerText = p.status_code + '...';
                
                document.querySelectorAll('.light').forEach(l => l.classList.remove('active'));
                if(p.signal === 'BUY') document.getElementById('l-green').classList.add('active');
                else if(p.signal === 'SELL') document.getElementById('l-red').classList.add('active');
                else document.getElementById('l-yellow').classList.add('active');

                // Графік
                const cRes = await fetch('/api/chart_data'); const cData = await cRes.json();
                if(cData.length > 0) {
                    candles.setData(cData.map(d => ({...d})));
                    const markers = cData.filter(d => d.signal !== 'WAIT').map(d => ({
                        time: d.time, position: d.signal === 'BUY' ? 'belowBar' : 'aboveBar',
                        color: d.signal === 'BUY' ? '#39ff14' : '#ff003c', shape: d.signal === 'BUY' ? 'arrowUp' : 'arrowDown',
                        text: d.signal
                    }));
                    candles.setMarkers(markers);
                }
            } catch(e) {}
        }
        setInterval(sync, 5000); sync();
    </script>
</body>
</html>
