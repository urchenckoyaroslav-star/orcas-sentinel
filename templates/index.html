<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="_KwUSSjTUf9_a7zKBkQk0zJrEm_IGE9HJupji9CiMOw" />
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐼</text></svg>">
    <title>PANDA_SENTINEL | Premium Crypto Terminal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        :root { 
            --br-gold: #ffd700; --br-orange: #ff8c00; --br-dark-gold: #b8860b;
            --br-green: #39ff14; --br-red: #ff003c; --br-cyan: #04d9ff;
        }
        body { 
            background: #050508; color: #fff; font-family: 'Rajdhani', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #0a0a0f 0%, #050508 100%);
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; z-index: 100; pointer-events: none; opacity: 0.3;
        }
        .cyber-card { 
            background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 215, 0, 0.15); border-top: 3px solid var(--br-gold); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .text-neon { text-shadow: 0 0 15px var(--br-gold); }
        .light { width: 70px; height: 70px; border-radius: 50%; filter: brightness(0.1); border: 4px solid #111; transition: 0.4s; }
        .light.active { filter: brightness(1.8); box-shadow: 0 0 40px currentColor; border-color: currentColor; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">
    <div class="scanlines"></div>

    <header class="w-full max-w-6xl flex justify-between items-center mb-10 mt-4">
        <h1 class="font-cyber text-4xl font-black text-neon">PANDA_<span style="color:var(--br-gold)">SENTINEL</span></h1>
        <div class="flex gap-2">
            <button class="bg-black border border-yellow-600/30 px-3 py-1 text-xs rounded text-yellow-500 font-bold">ENG</button>
            <button class="bg-black border border-yellow-600/30 px-3 py-1 text-xs rounded text-gray-500">RUS</button>
            <button class="bg-black border border-yellow-600/30 px-3 py-1 text-xs rounded text-gray-500">UKR</button>
        </div>
    </header>

    <div class="w-full max-w-6xl grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="cyber-card p-5 rounded-xl border-t-yellow-500">
            <div class="text-[10px] uppercase text-gray-500 font-cyber font-bold tracking-widest">Gold Futures</div>
            <div id="gold-val" class="text-2xl font-cyber text-yellow-400 mt-1">2340.50</div>
        </div>
        <div class="cyber-card p-5 rounded-xl border-t-gray-400">
            <div class="text-[10px] uppercase text-gray-500 font-cyber font-bold tracking-widest">Silver Futures</div>
            <div id="silver-val" class="text-2xl font-cyber text-gray-200 mt-1">28.15</div>
        </div>
        <div class="cyber-card p-5 rounded-xl border-t-orange-500">
            <div class="text-[10px] uppercase text-gray-500 font-cyber font-bold tracking-widest">Oil WTI</div>
            <div id="oil-val" class="text-2xl font-cyber text-orange-500 mt-1">82.40</div>
        </div>
        <div class="cyber-card p-5 rounded-xl border-t-cyan-500">
            <div class="text-[10px] uppercase text-gray-500 font-cyber font-bold tracking-widest">USD Index (DXY)</div>
            <div id="dxy-val" class="text-2xl font-cyber text-cyan-400 mt-1">104.20</div>
        </div>
    </div>

    <div class="w-full max-w-6xl cyber-card rounded-[40px] p-8 md:p-12 flex flex-col items-center mb-10">
        <div id="chart-container" class="w-full h-80 md:h-96 mb-10 rounded-2xl overflow-hidden border border-white/5 shadow-inner"></div>
        
        <div class="text-lg md:text-xl uppercase text-cyan-400 font-cyber font-bold tracking-widest mb-2">BITCOIN (BINANCE)</div>
        <div id="btc-val" class="font-cyber text-6xl md:text-8xl font-black mb-10 text-white text-neon">$0</div>

        <div class="flex gap-12 mb-10 bg-black/80 p-8 rounded-[40px] border border-gray-800 shadow-2xl">
            <div id="l-red" class="light" style="color:var(--br-red)"></div>
            <div id="l-yellow" class="light" style="color:var(--br-gold)"></div>
            <div id="l-green" class="light" style="color:var(--br-green)"></div>
        </div>
        
        <div id="status-text" class="w-full bg-black/60 border border-yellow-600/20 p-6 rounded-3xl text-2xl text-center font-bold text-gray-300 tracking-widest uppercase">SYNCING...</div>
    </div>

    <div class="w-full max-w-6xl cyber-card rounded-2xl p-8 text-center border-t-yellow-700">
        <h3 class="text-sm font-cyber text-gray-500 mb-6 tracking-widest uppercase font-bold">Support Server & Electricity</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
            <div class="bg-black/40 border border-orange-500/20 p-4 rounded-xl">
                <div class="text-[10px] text-orange-400 font-cyber mb-1">BITCOIN (Native)</div>
                <div class="text-xs text-gray-400 font-mono break-all">0x748f510de5c5c1f89f160b6e557b464e18f09d91</div>
            </div>
            <div class="bg-black/40 border border-green-500/20 p-4 rounded-xl">
                <div class="text-[10px] text-green-400 font-cyber mb-1">USDT (TRC20)</div>
                <div class="text-xs text-gray-400 font-mono break-all">TQ36w3mcrETYDqQe7tofrbn4GWtVbcuaUz</div>
            </div>
        </div>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { background: { color: '#0a0a0f' }, textColor: '#666' },
            grid: { vertLines: { visible: false }, horzLines: { color: '#1a1a25' } },
            timeScale: { borderColor: '#222' }
        });
        const candles = chart.addCandlestickSeries({ upColor: '#39ff14', downColor: '#ff003c', borderVisible: false });

        async function update() {
            try {
                const pRes = await fetch('/api/pulse'); const p = await pRes.json();
                document.getElementById('btc-val').innerText = '$' + Math.floor(p.btc_price).toLocaleString();
                document.getElementById('gold-val').innerText = p.gold_price.toFixed(2);
                document.getElementById('silver-val').innerText = p.silver_price.toFixed(2);
                document.getElementById('oil-val').innerText = p.oil_price.toFixed(2);
                document.getElementById('dxy-val').innerText = p.dxy_index.toFixed(2);
                document.getElementById('status-text').innerText = p.status_code + '...';

                document.querySelectorAll('.light').forEach(l => l.classList.remove('active'));
                if(p.signal === 'BUY') document.getElementById('l-green').classList.add('active');
                else if(p.signal === 'SELL') document.getElementById('l-red').classList.add('active');
                else document.getElementById('l-yellow').classList.add('active');

                const cRes = await fetch('/api/chart_data'); const cData = await cRes.json();
                if(cData.length > 0) {
                    candles.setData(cData);
                    const markers = cData.filter(d => d.signal !== 'WAIT').map(d => ({
                        time: d.time, position: d.signal === 'BUY' ? 'belowBar' : 'aboveBar',
                        color: d.signal === 'BUY' ? '#39ff14' : '#ff003c', shape: d.signal === 'BUY' ? 'arrowUp' : 'arrowDown',
                        text: d.signal
                    }));
                    candles.setMarkers(markers);
                }
            } catch(e) {}
        }
        setInterval(update, 5000); update();
    </script>
</body>
</html>
